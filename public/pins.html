<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
<title>Niche Finder — Épinglés</title>
  <link rel="stylesheet" href="/app.css">
</head>
<body>
  <div class="app">
    <aside class="side"></aside>

    <main class="main">
      <h1 class="page-title">Épinglés</h1>
      <div class="section">
        <h2>📌 Vidéos épinglées <span class="count" id="c-vid"></span></h2>
        <div class="tablecard">
        <table>
          <thead>
            <tr>
              <th style="width:100px"></th>
              <th>Titre / chaîne</th>
              <th class="num" style="width:70px">Vues</th>
              <th style="width:80px">30j</th>
              <th class="num" style="width:64px">Abonnés</th>
              <th class="num" style="width:56px">Ratio</th>
              <th class="num" style="width:56px">Durée</th>
              <th style="width:120px"></th>
            </tr>
          </thead>
          <tbody id="vids"><tr><td colspan="7" class="empty">Chargement…</td></tr></tbody>
        </table>
        </div>
      </div>

      <div class="section">
        <h2>👁️ Chaînes suivies <span class="count" id="c-chan"></span></h2>
        <div class="tablecard">
        <table>
          <thead>
            <tr>
              <th>Chaîne</th>
              <th class="num" style="width:80px">Abonnés</th>
              <th style="width:80px">30j</th>
              <th style="width:80px">Origine</th>
              <th style="width:90px"></th>
            </tr>
          </thead>
          <tbody id="chans"><tr><td colspan="4" class="empty">Chargement…</td></tr></tbody>
        </table>
        </div>
      </div>

      <div class="section archived">
        <h2>🗄️ Vidéos archivées <span class="count" id="c-arch"></span></h2>
        <div class="tablecard">
        <table>
          <thead>
            <tr>
              <th style="width:100px"></th>
              <th>Titre / chaîne</th>
              <th class="num" style="width:70px">Vues</th>
              <th class="num" style="width:64px">Abonnés</th>
              <th class="num" style="width:56px">Ratio</th>
              <th class="num" style="width:56px">Durée</th>
              <th style="width:120px"></th>
            </tr>
          </thead>
          <tbody id="arch"><tr><td colspan="7" class="empty">Aucune vidéo archivée.</td></tr></tbody>
        </table>
        </div>
      </div>

  <script>
    function fmt(n) {
      if (n === null || n === undefined) return "—";
      if (n >= 1e6) return (n / 1e6).toFixed(1).replace(".", ",") + "M";
      if (n >= 1e3) return Math.round(n / 1e3) + "k";
      return String(n);
    }
    function durTxt(s) {
      const m = Math.floor(s / 60), sec = s % 60;
      return m + ":" + String(sec).padStart(2, "0");
    }
    function esc(t) {
      const d = document.createElement("div"); d.textContent = t || ""; return d.innerHTML;
    }

    // --- Sparklines ---
    let SPARKS = { videos: {}, channels: {} };

    // Trace une polyline SVG à partir d'une série de nombres.
    // Vert si la série monte, rouge si elle descend, gris si plate.
    function sparkline(values) {
      const pts = values.filter(v => v !== null && v !== undefined);
      if (pts.length < 2) return '<span class="spark-none">—</span>';

      const W = 72, H = 22, P = 2;
      const min = Math.min(...pts), max = Math.max(...pts);
      const span = max - min || 1;
      const stepX = (W - P * 2) / (pts.length - 1);

      const coords = pts.map((v, i) => {
        const x = P + i * stepX;
        const y = H - P - ((v - min) / span) * (H - P * 2);
        return `${x.toFixed(1)},${y.toFixed(1)}`;
      }).join(' ');

      const delta = pts[pts.length - 1] - pts[0];
      const color = delta > 0 ? '#22c55e' : (delta < 0 ? '#ef4444' : '#94a3b8');
      const last = coords.split(' ').pop().split(',');

      return `<svg class="spark" viewBox="0 0 ${W} ${H}" width="${W}" height="${H}">
        <polyline points="${coords}" fill="none" stroke="${color}" stroke-width="1.6"
                  stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="${last[0]}" cy="${last[1]}" r="2" fill="${color}"/>
      </svg>`;
    }

    // Charge toutes les séries d'un coup, puis remplit les cellules déjà rendues.
    async function loadSparklines() {
      try {
        const res = await fetch("/api/history/sparklines?days=30");
        SPARKS = await res.json();
      } catch { return; }

      document.querySelectorAll("[data-spark-video]").forEach(cell => {
        const serie = SPARKS.videos[cell.dataset.sparkVideo] || [];
        cell.innerHTML = sparkline(serie.map(p => p.views));
      });

      document.querySelectorAll("[data-spark-channel]").forEach(cell => {
        const serie = SPARKS.channels[cell.dataset.sparkChannel] || [];
        cell.innerHTML = sparkline(serie.map(p => p.subscribers));
      });
    }

    // Ligne vidéo commune (épinglée ou archivée), avec boutons adaptés.
    function videoRow(v, archived) {
      const ratio = v.ratio === null ? "—" : Number(v.ratio);
      const cls = (ratio !== "—" && ratio >= 20) ? "ratio" : "ratio mid";
      const actions = archived
        ? `<button class="act" onclick="repin('${v.video_id}', this)" title="Ré-épingler">📌</button>
           <button class="act del" onclick="del('${v.video_id}', this)" title="Supprimer définitivement">🗑️</button>`
        : `<button class="act" onclick="unpin('${v.video_id}', this)" title="Désépingler (archiver)">📎</button>
           <button class="act del" onclick="del('${v.video_id}', this)" title="Supprimer définitivement">🗑️</button>`;
      return `
        <tr id="row-${v.video_id}">
          <td><img class="thumb" src="${v.thumbnail}" alt="" loading="lazy"></td>
          <td class="title">
            <a href="https://www.youtube.com/watch?v=${v.video_id}" target="_blank">${esc(v.title)}</a>
            <div class="chan"><a class="sblink" href="https://www.youtube.com/channel/${v.channel_id}" target="_blank" rel="noopener">${esc(v.channel_title)}</a> · <a class="sblink" href="https://socialblade.com/youtube/channel/${v.channel_id}" target="_blank" rel="noopener">SocialBlade</a></div>
          </td>
          <td class="num">${fmt(v.views)}</td>
          <td class="spark-cell" data-spark-video="${v.video_id}"><span class="spark-none">…</span></td>
          <td class="num">${fmt(v.subscribers)}</td>
          <td class="num ${cls}">${ratio}</td>
          <td class="num">${durTxt(v.duration_seconds)}</td>
          <td style="white-space:nowrap">${actions}</td>
        </tr>`;
    }

    async function loadPins() {
      const res = await fetch("/api/pins");
      const vids = await res.json();
      document.getElementById("c-vid").textContent = vids.length ? `(${vids.length})` : "";
      const tbody = document.getElementById("vids");
      tbody.innerHTML = vids.length
        ? vids.map(v => videoRow(v, false)).join("")
        : '<tr><td colspan="8" class="empty">Aucune vidéo épinglée pour l\'instant.</td></tr>';
    }

    async function loadArchived() {
      const res = await fetch("/api/pins/archived");
      const vids = await res.json();
      document.getElementById("c-arch").textContent = vids.length ? `(${vids.length})` : "";
      const tbody = document.getElementById("arch");
      tbody.innerHTML = vids.length
        ? vids.map(v => videoRow(v, true)).join("")
        : '<tr><td colspan="8" class="empty">Aucune vidéo archivée.</td></tr>';
    }

    async function loadFollows() {
      const res = await fetch("/api/follows");
      const chans = await res.json();
      document.getElementById("c-chan").textContent = chans.length ? `(${chans.length})` : "";
      const tbody = document.getElementById("chans");
      if (!chans.length) { tbody.innerHTML = '<tr><td colspan="5" class="empty">Aucune chaîne suivie pour l\'instant.</td></tr>'; return; }
      tbody.innerHTML = chans.map(c => {
        const origin = c.source === "video" ? "via vidéo" : "manuel";
        return `
          <tr>
            <td class="title"><a href="${c.channel_url}" target="_blank">${esc(c.channel_title)}</a>${c.handle ? `<div class="chan">${esc(c.handle)}</div>` : ""}</td>
            <td class="num">${fmt(c.subscribers)}</td>
            <td class="spark-cell" data-spark-channel="${c.channel_id}"><span class="spark-none">…</span></td>
            <td><span class="src">${origin}</span></td>
            <td style="white-space:nowrap">
              <a class="sblink" href="https://socialblade.com/youtube/channel/${c.channel_id}" target="_blank" rel="noopener">SB</a>
              <a class="act" href="/targets.html?channelId=${c.channel_id}" title="Analyser cette chaîne (Channel Crawl)" style="text-decoration:none;display:inline-block">🎯</a>
            </td>
          </tr>`;
      }).join("");
    }

    // --- Actions ---
    async function post(url, videoId) {
      const res = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ videoId }),
      });
      if (!res.ok) { const j = await res.json().catch(() => ({})); throw new Error(j.error || "Erreur"); }
    }

    async function unpin(videoId, btn) {
      btn.disabled = true;
      try { await post("/api/unpin", videoId); await refresh(); }
      catch (err) { alert(err.message); btn.disabled = false; }
    }

    async function repin(videoId, btn) {
      btn.disabled = true;
      try { await post("/api/repin", videoId); await refresh(); }
      catch (err) { alert(err.message); btn.disabled = false; }
    }

    async function del(videoId, btn) {
      if (!confirm("Supprimer définitivement cette vidéo et tout son historique ? Cette action est irréversible.")) return;
      btn.disabled = true;
      try {
        const res = await fetch("/api/pins/" + encodeURIComponent(videoId), { method: "DELETE" });
        if (!res.ok) { const j = await res.json().catch(() => ({})); throw new Error(j.error || "Erreur"); }
        await refresh();
      } catch (err) { alert(err.message); btn.disabled = false; }
    }

    // Recharge les trois listes.
    async function refresh() {
      await loadPins();
      await loadArchived();
      await loadFollows();
      loadSparklines(); 
    }

    refresh();
  </script>
  <script src="/nav.js"></script>
</body> 
</html>
